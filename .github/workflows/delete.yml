name: Delete Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  delete:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::302432775392:role/GitHubActionsDeploymentRole
          aws-region: us-east-1

      - name: Empty Buckets
        run: |
          aws s3 rm s3://lambda-code-s3-bucket --recursive || true
          aws s3 rm s3://aws-serverless-data-pipeline-s3-bucket --recursive || true

      - name: Delete Stack
        run: |
          aws cloudformation delete-stack \
            --stack-name data-pipeline-stack