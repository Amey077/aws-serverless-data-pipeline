name: Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::302432775392:role/GitHubActionsDeploymentRole
          aws-region: us-east-1

      - name: Zip Lambda Code
        run: |
          zip -r retrieve.zip lambda/retrieve
          zip -r uncompress.zip lambda/uncompress
          zip -r transform.zip lambda/transform

      - name: Upload Lambda Packages
        run: |
          aws s3 cp retrieve.zip s3://lambda-code-s3-bucket/
          aws s3 cp uncompress.zip s3://lambda-code-s3-bucket/
          aws s3 cp transform.zip s3://lambda-code-s3-bucket/

      - name: Deploy Stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/template.json \
            --stack-name data-pipeline-stack \
            --capabilities CAPABILITY_NAMED_IAM